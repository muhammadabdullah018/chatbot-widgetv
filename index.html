<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brew & Batter Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LANDING SCREEN -->
  <div class="screen" id="screen-landing">
    <div class="landing-content">
      <h1 class="landing-title">Your <span class="highlight">Smart Bakery Assistant</span><br/>for Any Orders</h1>
      
      <div class="avatar-showcase">
        <div class="hello-bubble">Hello!</div>
        <div class="colorful-avatar large"></div>
      </div>

      <p class="landing-sub">Get instant help with our menu, place orders, or check today's specials at Brew & Batter!</p>
      
      <button class="btn-get-started" id="btn-start">
        Get started <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div class="screen hidden" id="screen-chat">
    
    <div class="chat-header">
      <button class="btn-back" id="btn-back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="header-name">Brew & Batter</div>
      <button class="btn-icon" id="btn-clear" title="Clear chat" style="display:none;"></button>
    </div>

    <div class="chat-container">
      <div class="chat-messages" id="chat-messages">
        <!-- Welcome message -->
        <div class="message bot-message" id="welcome-msg">
          <div class="msg-avatar"></div>
          <div class="msg-content">
            <div class="msg-bubble">Hi there! How can I help you today? Would you like to see our artisan bakery menu?</div>
            <div class="msg-time">Just now</div>
          </div>
        </div>
        
        <!-- Quick replies will be populated by chat.js -->
        <div class="quick-replies" id="quick-replies"></div>
      </div>
      
      <!-- Typing indicator -->
      <div class="typing-indicator hidden" id="typing-indicator">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="input-wrapper">
        <button class="att-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </button>
        <textarea
          id="chat-input"
          placeholder="Message"
          rows="1"
          maxlength="500"
        ></textarea>
        <button class="mic-btn" id="btn-send">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>
      </div>
    </div>
    
  </div>

  <script src="config.js"></script>
  <script src="chat.js"></script>
</body>
</html>
